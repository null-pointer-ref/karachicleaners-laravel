name: SEO Optimization & Sitemap Generation

on:
  push:
    branches:
      - main
    paths:
      - 'config/**'
      - 'resources/**'
      - 'routes/**'
      - '.github/workflows/**'
  schedule:
    - cron: '30 2 * * 1'  # Monday 2:30 AM UTC (7:30 AM PKT)
  workflow_dispatch:

env:
  PHP_VERSION: 8.2
  PYTHON_VERSION: 3.11

jobs:
  generate-sitemap-robots:
    name: Generate Sitemap & robots.txt
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: ⬇️ Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: curl, json, mbstring, xml
          tools: composer
          coverage: none
          ini-file: production

      - name: 📁 Create Public Directory
        run: |
          mkdir -p public
          chmod 755 public

      - name: 🗺️ Generate sitemap.xml
        run: |
          echo "🗺️ Generating sitemap.xml..."
          php scripts/generate-sitemap.php
          
          # Verify file was created
          if [ -f public/sitemap.xml ]; then
            echo "✅ Sitemap created successfully"
            ls -lh public/sitemap.xml
            head -n 20 public/sitemap.xml
          else
            echo "❌ Sitemap not found"
            exit 1
          fi

      - name: 🤖 Generate robots.txt
        run: |
          echo "🤖 Generating robots.txt..."
          php scripts/generate-robots.php
          
          # Verify file was created
          if [ -f public/robots.txt ]; then
            echo "✅ robots.txt created successfully"
            ls -lh public/robots.txt
            cat public/robots.txt
          else
            echo "❌ robots.txt not found"
            exit 1
          fi

      - name: 📝 Commit Generated Files (if changed)
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # Check if there are changes
          if git diff --quiet public/; then
            echo "✅ No changes to commit"
          else
            echo "📝 Committing changes..."
            git add public/sitemap.xml public/robots.txt
            git commit -m "🤖 Auto-update: sitemap and robots.txt [skip ci]"
            git push origin main
            echo "✅ Changes pushed"
          fi

  seo-scan:
    name: SEO Scan & Optimization
    runs-on: ubuntu-latest
    needs: generate-sitemap-robots
    if: success() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: ⬇️ Checkout Code
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: curl, json, mbstring, xml
          tools: composer
          coverage: none

      - name: 📁 Create Storage Directories
        run: |
          mkdir -p storage/seo-logs
          mkdir -p storage/seo-backups
          mkdir -p storage/seo-reports
          chmod -R 755 storage/

      - name: 🔍 Scan Pages for SEO Issues
        run: |
          echo "🔍 Scanning pages for SEO issues..."
          php scripts/seo-scanner.php > /tmp/scan-output.txt 2>&1
          cat /tmp/scan-output.txt

      - name: ✨ Optimize Content with AI
        run: |
          echo "✨ Optimizing content with AI..."
          php scripts/apply-optimizations.php > /tmp/optimize-output.txt 2>&1
          cat /tmp/optimize-output.txt

      - name: 📊 Generate SEO Report
        run: |
          echo "📊 Generating SEO report..."
          php scripts/generate-seo-report.php > /tmp/report-output.txt 2>&1
          cat /tmp/report-output.txt

      - name: 📝 Create Pull Request with Optimizations
        if: always()
        run: |
          git config user.name "SEO Bot"
          git config user.email "seo-bot@github.com"
          
          BRANCH="seo-optimization-$(date +%Y%m%d-%H%M%S)"
          
          # Check if there are changes
          if [ -n "$(git status --porcelain)" ]; then
            git checkout -b $BRANCH
            git add resources/views/ config/
git commit -m "♻️ SEO Optimization: Auto-optimized content with AI - Updated meta tags - Optimized titles and descriptions - Integrated trending keywords - Improved keyword coverage - Enhanced for Pakistan cleaning market"
git push origin $BRANCH
            
            echo "✅ Changes committed to branch: $BRANCH"
            echo "📌 Pull request will be created (manually review and merge)"
          else
            echo "✅ No content changes needed"
          fi

  validate-all:
    name: Validate All Changes
    runs-on: ubuntu-latest
    needs: generate-sitemap-robots
    if: always()

    steps:
      - name: ⬇️ Checkout Code
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: curl, json, xml

      - name: ✅ Validate sitemap.xml
        run: |
          echo "Validating sitemap.xml..."
          if [ -f public/sitemap.xml ]; then
            php -r "
              \$xml = simplexml_load_file('public/sitemap.xml');
              if (\$xml === false) {
                echo '❌ Invalid XML in sitemap.xml';
                exit(1);
              }
              \$urls = \$xml->url;
              echo '✅ Sitemap is valid XML with ' . count(\$urls) . ' URLs';
            " || true
          else
            echo "⚠️ sitemap.xml not found (will be created on first run)"
          fi

      - name: ✅ Validate robots.txt
        run: |
          echo "Validating robots.txt..."
          if [ -f public/robots.txt ]; then
            echo "✅ robots.txt exists"
            echo "📋 robots.txt content preview:"
            head -n 15 public/robots.txt || true
          else
            echo "⚠️ robots.txt not found (will be created on first run)"
          fi

      - name: 📊 Workflow Summary
        run: |
          echo "=========================================="
          echo "SEO Automation Workflow Summary"
          echo "=========================================="
          echo "✅ Workflow Validation: Complete"
          echo "✅ File Generation: Ready"
          echo ""
          echo "Generated Files:"
          [ -f public/sitemap.xml ] && echo "  • public/sitemap.xml" || echo "  • public/sitemap.xml (pending)"
          [ -f public/robots.txt ] && echo "  • public/robots.txt" || echo "  • public/robots.txt (pending)"
          echo ""
          echo "=========================================="